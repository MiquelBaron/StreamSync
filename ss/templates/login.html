{% load static %}
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inici de sessió | StreamSync</title>
    <link rel="stylesheet" href="{% static 'ss/css/streamsync-ui.css' %}">
</head>
<body class="auth-page">
    <div class="auth-page__bar">
        <a class="auth-page__logo" href="{% url 'login' %}">STREAMSYNC</a>
    </div>
    <main class="auth-page__main">
        <div class="auth-card">
            <h1 class="auth-card__title">Inicia sessió</h1>
            <p class="auth-card__subtitle">Introdueix les teves credencials per accedir al catàleg.</p>

            {% if form.errors %}
                <div class="error-box">Usuari o contrasenya incorrectes.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <label for="id_username">Usuari</label>
                    <input type="text" name="username" id="id_username" placeholder="Usuari" required autofocus>
                </div>
                <div class="field">
                    <label for="id_password">Contrasenya</label>
                    <input type="password" name="password" id="id_password" placeholder="Contrasenya" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <p class="auth-card__footer">
                No tens compte? <a href="{% url 'register' %}">Registra’t ara</a>.
            </p>
        </div>
    </main>
</body>
</html>
