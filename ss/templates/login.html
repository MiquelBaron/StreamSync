<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StreamSync</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .brand p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 1rem;
        }

        .field input::placeholder {
            color: #cbd5e1;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.18);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fecaca;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .footer-text {
            margin-top: 18px;
            text-align: center;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .demo {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.07);
            color: #cbd5e1;
            font-size: 0.88rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <h1>StreamSync</h1>
            <p>Inicia sessió per continuar</p>
        </div>

        {% if form.errors %}
            <div class="error-box">
                Usuari o contrasenya incorrectes.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="field">
                <label for="id_username">Usuari</label>
                <input type="text" name="username" id="id_username" placeholder="Introdueix el teu usuari" required>
            </div>

            <div class="field">
                <label for="id_password">Contrasenya</label>
                <input type="password" name="password" id="id_password" placeholder="Introdueix la teva contrasenya" required>
            </div>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <div class="footer-text">
            Accés segur amb Django Auth
        </div>
    </div>
</body>
</html>
