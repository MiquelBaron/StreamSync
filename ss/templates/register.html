<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre | StreamSync</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .register-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .brand p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 1rem;
        }

        .helptext {
            display: block;
            margin-top: 6px;
            color: #cbd5e1;
            font-size: 0.8rem;
        }

        ul.errorlist {
            list-style: none;
            margin-bottom: 10px;
            color: #fecaca;
            font-size: 0.9rem;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .footer-text {
            margin-top: 16px;
            text-align: center;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: #93c5fd;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand">
            <h1>StreamSync</h1>
            <p>Crea el teu compte</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text|safe }}</span>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn">Registrar-me</button>
        </form>

        <div class="footer-text">
            Ja tens compte? <a href="{% url 'login' %}">Inicia sessio</a>
        </div>
    </div>
</body>
</html>
