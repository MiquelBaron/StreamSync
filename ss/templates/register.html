{% load static %}
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre | StreamSync</title>
    <link rel="stylesheet" href="{% static 'ss/css/streamsync-ui.css' %}">
</head>
<body class="auth-page">
    <div class="auth-page__bar">
        <a class="auth-page__logo" href="{% url 'login' %}">STREAMSYNC</a>
    </div>
    <main class="auth-page__main">
        <div class="auth-card">
            <h1 class="auth-card__title">Crea el teu compte</h1>
            <p class="auth-card__subtitle">Uneix-te a StreamSync en un moment.</p>

            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="field">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {{ field.errors }}
                        {% if field.help_text %}
                            <span class="helptext">{{ field.help_text|safe }}</span>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn-primary">Registrar-me</button>
            </form>

            <p class="auth-card__footer">
                Ja tens compte? <a href="{% url 'login' %}">Inicia sessió</a>.
            </p>
        </div>
    </main>
</body>
</html>
